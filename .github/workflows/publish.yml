name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      # Node + npm are used for publishing (provenance + registry auth).
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing (OIDC) requires npm >= 11.5.1. Pin to npm 11 so the
      # engine stays compatible with the runner's Node (npm 12 needs Node >=22).
      - name: Upgrade npm
        run: npm install -g npm@11

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      # No NODE_AUTH_TOKEN needed: npm authenticates via OIDC using the
      # trusted publisher configured for this package. Provenance is emitted
      # automatically under trusted publishing.
      #
      # Prerelease tags (e.g. v0.4.1-rc0) publish under the "next" dist-tag so
      # they never become the default `npm install chatto.ts` version. Stable
      # tags publish as "latest".
      - name: Publish
        run: |
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            npm publish --access public --tag next
          else
            npm publish --access public
          fi
